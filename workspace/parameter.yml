# =====================================================================================
# parameter.yml — fabric-cicd dev -> test -> prod promotion for Contoso Insurance
# -------------------------------------------------------------------------------------
# fabric-cicd REQUIRES this file in the ROOT of `repository_directory` (= workspace/).
# It binds every cross-item reference at deploy time so NO real workspace/item GUIDs
# are committed to git. Dynamic variables ($items / $workspace) resolve against the
# TARGET workspace; `_ALL_` applies the same replacement to dev, test and prod.
#
# Item type + item name in $items.<Type>.<Name> are CASE-SENSITIVE and must match the
# on-disk item folder names exactly.
# =====================================================================================

key_value_replace:
  # --- pl_insurance_orchestration: bind each TridentNotebook activity to the deployed
  #     Notebook GUID in the target workspace (committed value is the notebook logicalId).
  - find_key: $.properties.activities[?(@.name=="Generate Demo Data")].typeProperties.notebookId
    replace_value:
      _ALL_: "$items.Notebook.nb_00_generate_demo_data.$id"
    item_type: "DataPipeline"
    item_name: "pl_insurance_orchestration"

  - find_key: $.properties.activities[?(@.name=="Bronze To Silver")].typeProperties.notebookId
    replace_value:
      _ALL_: "$items.Notebook.nb_01_bronze_to_silver.$id"
    item_type: "DataPipeline"
    item_name: "pl_insurance_orchestration"

  - find_key: $.properties.activities[?(@.name=="Silver To Gold")].typeProperties.notebookId
    replace_value:
      _ALL_: "$items.Notebook.nb_02_silver_to_gold.$id"
    item_type: "DataPipeline"
    item_name: "pl_insurance_orchestration"

  - find_key: $.properties.activities[?(@.name=="Load Warehouse")].typeProperties.notebookId
    replace_value:
      _ALL_: "$items.Notebook.nb_03_load_warehouse.$id"
    item_type: "DataPipeline"
    item_name: "pl_insurance_orchestration"

  # --- pl_insurance_orchestration: point every notebook activity at the target workspace.
  - find_key: $.properties.activities[*].typeProperties.workspaceId
    replace_value:
      _ALL_: "$workspace.$id"
    item_type: "DataPipeline"
    item_name: "pl_insurance_orchestration"

find_replace:
  # --- es_telematics: bind the Eventhouse destination to the deployed KQL database
  #     (committed value is the kqldb logicalId) and the target workspace.
  - find_value: "11111111-1111-1111-1111-000000000031"
    replace_value:
      _ALL_: "$items.KQLDatabase.kqldb_insurance_realtime.$id"
    item_type: "Eventstream"
    item_name: "es_telematics"
    file_path: "/es_telematics.Eventstream/eventstream.json"

  - find_value: "00000000-0000-0000-0000-000000000000"
    replace_value:
      _ALL_: "$workspace.$id"
    item_type: "Eventstream"
    item_name: "es_telematics"
    file_path: "/es_telematics.Eventstream/eventstream.json"

  # --- kqs_realtime_insights: point the queryset cluster URI at the deployed
  #     Eventhouse query service endpoint.
  - find_value: "https://PLACEHOLDER-EVENTHOUSE-QUERY-URI.kusto.fabric.microsoft.com"
    replace_value:
      _ALL_: "$items.Eventhouse.eh_insurance_realtime.$queryserviceuri"
    item_type: "KQLQueryset"
    item_name: "kqs_realtime_insights"

  # --- sm_insurance: repoint the Direct Lake OneLake source at the target workspace
  #     + the deployed lh_insurance lakehouse (see definition/expressions.tmdl).
  - find_value: "PLACEHOLDER_WORKSPACE_ID"
    replace_value:
      _ALL_: "$workspace.$id"
    item_type: "SemanticModel"
    item_name: "sm_insurance"

  - find_value: "PLACEHOLDER_LAKEHOUSE_ID"
    replace_value:
      _ALL_: "$items.Lakehouse.lh_insurance.$id"
    item_type: "SemanticModel"
    item_name: "sm_insurance"
